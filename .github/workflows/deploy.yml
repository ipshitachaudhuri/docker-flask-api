kname: Deploy Flask API

on:
  workflow_run:
    workflows:
      - Test Flask API
    types:
      - completed

permissions:
  contents: read
  packages: read

jobs:
  deploy:

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: ubuntu-latest

    steps:

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Docker image
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/flask-api:latest

      - name: Verify image
        run: |
          docker images

