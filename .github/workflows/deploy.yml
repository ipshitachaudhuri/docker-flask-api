name: Deploy Flask API

on:
  workflow_run:
    workflows:
      - Test Flask API
    types:
      - completed

jobs:

  deploy:

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read

    steps:

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Image
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/flask-api:latest

      - name: Verify
        run: |
          docker images
