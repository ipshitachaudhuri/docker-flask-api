name: Docker Build and Test

on:
  push:
    branches:
      - main

jobs:

  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: |
          pytest


  docker-build:
    name: Build and Push Docker Image
    needs: test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v5


      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Build Docker image
        run: |
          docker build \
          -t ghcr.io/ipshitachaudhuri/flask-api:${{ github.sha }} .


      - name: Push Docker image
        run: |
          docker push ghcr.io/ipshitachaudhuri/flask-api:${{ github.sha }}


      - name: Tag latest
        run: |
          docker tag \
          ghcr.io/ipshitachaudhuri/flask-api:${{ github.sha }} \
          ghcr.io/ipshitachaudhuri/flask-api:latest


      - name: Push latest
        run: |
          docker push ghcr.io/ipshitachaudhuri/flask-api:latest
