      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/ipshitachaudhuri/flask-api:latest
            ghcr.io/ipshitachaudhuri/flask-api:${{ github.sha }}

