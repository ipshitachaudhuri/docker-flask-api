name: Docker Build

on:
  push:
    branches:
      - main

jobs:

  docker:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

      - name: Checkout
        uses: actions/checkout@v4


      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Build image
        run: |
          docker build \
          -t ghcr.io/ipshitachaudhuri/flask-api:latest .


      - name: Push image
        run: |
          docker push ghcr.io/ipshitachaudhuri/flask-api:latest
