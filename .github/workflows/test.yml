name: Test Flask API

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4


      - name: Build containers
        run: |
          docker compose build


      - name: Start containers
        run: |
          docker compose up -d


      - name: Wait for Flask API
        run: |
          sleep 15
          curl --fail http://localhost:8000/health


      - name: Show containers
        run: |
          docker compose ps


      - name: Show Flask logs
        run: |
          docker compose logs flask-api


      - name: Run tests
        run: |
          docker compose exec -T flask-api pytest -v


      - name: Stop containers
        if: always()
        run: |
          docker compose down


