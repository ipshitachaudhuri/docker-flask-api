kname: Test Flask API

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4


      - name: Start containers
        run: |
          docker compose up -d
          sleep 10


      - name: Check containers
        run: |
          docker compose ps


      - name: Run tests
        run: |
          docker compose exec -T flask-api pytest -v


      - name: Stop containers
        if: always()
        run: |
          docker compose down

