services:

  postgres-db:
    image: postgres:16
    container_name: postgres-db
    restart: unless-stopped

    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

    networks:
      - flask-network


  flask-api:
    build:
      context: .

    image: flask-api-local

    container_name: flask-api
    restart: unless-stopped

    ports:
      - "8000:8000"

    environment:
      DB_HOST: postgres-db
      DB_NAME: postgres
      DB_USER: postgres
      DB_PASSWORD: postgres

    depends_on:
      postgres-db:
        condition: service_healthy

    networks:
      - flask-network


volumes:

  postgres-data:


networks:

  flask-network:


